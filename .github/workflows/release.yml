name: Build and Release Go Binaries
on:
  release:
    types: [created]
jobs:
  build:
    name: Build and Publish
    strategy:
      fail-fast: false
      matrix:
        os: [darwin, windows, linux]
        arch: [arm64, amd64]
        include:
          - os: windows
            extension: .exe
    permissions:
      contents: write
      actions: write
      id-token: write
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.0"
      - name: Get release version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Build binaries
        env:
          CGO_ENABLED: 0
          VERSION: ${{ steps.get_version.outputs.VERSION }}
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          go build -ldflags="-X 'main.Version=$VERSION'" -o release/jjui-$VERSION-${{ matrix.os }}-${{ matrix.arch }}${{matrix.extension}} cmd/jjui/main.go
          zip -j release/jjui-$VERSION-${{ matrix.os }}-${{ matrix.arch }}.zip release/jjui-$VERSION-${{ matrix.os }}-${{ matrix.arch }}${{matrix.extension}}
      - name: Upload release binaries
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
